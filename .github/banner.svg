<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="1280" y2="640"/><line x1="1280" y1="0" x2="0" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <circle cx="640" cy="320" r="200" fill="none"/><circle cx="640" cy="320" r="300" fill="none"/>
  </g>
  
  <!-- CAD drawing elements -->
  <g transform="translate(80, 120)" opacity="0.15" stroke="#00d2ff" stroke-width="1.5" fill="none">
    <rect x="0" y="0" width="120" height="80" rx="2"/>
    <rect x="20" y="20" width="30" height="40"/>
    <circle cx="85" cy="50" r="15"/>
    <line x1="140" y1="40" x2="200" y2="40"/>
    <line x1="170" y1="10" x2="170" y2="70"/>
    <rect x="220" y="0" width="100" height="60" rx="2"/>
    <line x1="220" y1="20" x2="320" y2="20"/>
    <line x1="220" y1="40" x2="320" y2="40"/>
  </g>
  
  <g transform="translate(900, 400)" opacity="0.12" stroke="#3a7bd5" stroke-width="1.5" fill="none">
    <rect x="0" y="0" width="150" height="100" rx="2"/>
    <rect x="10" y="10" width="50" height="30"/>
    <circle cx="100" cy="60" r="20"/>
    <line x1="0" y1="50" x2="150" y2="50"/>
  </g>
  
  <!-- Icon -->
  <g transform="translate(640, 220)" filter="url(#glow)">
    <rect x="-50" y="-50" width="100" height="100" rx="20" fill="url(#accent)" opacity="0.9"/>
    <g transform="translate(-25, -25)" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
      <rect x="5" y="5" width="40" height="30" rx="2"/>
      <rect x="12" y="12" width="12" height="16" rx="1"/>
      <circle cx="33" cy="25" r="6"/>
      <path d="M5 40 L20 50 L35 40"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="640" y="330" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#fff" letter-spacing="2">
    CadLibraryManager
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="380" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#8892b0" letter-spacing="1">
    AutoCAD 本地 DWG 图库管理插件
  </text>
  
  <!-- Version badges -->
  <g transform="translate(640, 430)" text-anchor="middle">
    <rect x="-200" y="-15" width="90" height="30" rx="15" fill="#233" stroke="#00d2ff" stroke-width="1"/>
    <text x="-155" y="5" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#00d2ff">2018-2024</text>
    
    <rect x="-90" y="-15" width="90" height="30" rx="15" fill="#233" stroke="#3a7bd5" stroke-width="1"/>
    <text x="-45" y="5" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3a7bd5">2025-2026</text>
    
    <rect x="20" y="-15" width="70" height="30" rx="15" fill="#233" stroke="#4ecdc4" stroke-width="1"/>
    <text x="55" y="5" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4ecdc4">.NET 8</text>
    
    <rect x="110" y="-15" width="70" height="30" rx="15" fill="#233" stroke="#ff6b6b" stroke-width="1"/>
    <text x="145" y="5" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#ff6b6b">C# 12</text>
  </g>
  
  <!-- Bottom features -->
  <g transform="translate(640, 520)" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#5a6a8a">
    <text x="-300">📂 图库浏览</text>
    <text x="-150">🔍 搜索筛选</text>
    <text x="0">⭐ 收藏管理</text>
    <text x="150">🧩 一键插入</text>
    <text x="300">📥 批量导入</text>
  </g>
</svg>